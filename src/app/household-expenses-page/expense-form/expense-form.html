
<form>
    <hlm-field-group>
        <hlm-field>
            <label hlmFieldLabel>Expense Name</label>
            <input hlmInput placeholder="Ex. Weekly Groceries">
        </hlm-field>

        <hlm-field>
            <label hlmFieldLabel>Amount</label>
            <hlm-input-group>
                <hlm-input-group-addon>
                    <span>$</span>
                </hlm-input-group-addon>
                <input hlmInputGroupInput type="number" placeholder="Ex. 50.00">
            </hlm-input-group>
        </hlm-field>

        <hlm-field>
            <label hlmFieldLabel>Category</label>
            <hlm-native-select>
                <option hlmNativeSelectOption value="">Select a Category</option>
                <option hlmNativeSelectOption value="food">Food & Drink</option>
                <option hlmNativeSelectOption value="groceries">Groceries</option>
                <option hlmNativeSelectOption value="shopping">Shopping</option>
            </hlm-native-select>
        </hlm-field>
    </hlm-field-group>
</form>
