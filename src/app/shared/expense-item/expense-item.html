
<hlm-item variant="outline">
    <hlm-item-content>
        <hlm-item-title>{{ expense().description }}</hlm-item-title>
        <hlm-item-description>
            <span hlmBadge>{{ description() }}</span>
        </hlm-item-description>
    </hlm-item-content>

    <hlm-item-content>
        <p hlmItemDescription>{{ expense().amount | dollarAmount }}</p>
    </hlm-item-content>
</hlm-item>
