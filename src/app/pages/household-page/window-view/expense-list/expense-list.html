<div class="flex flex-col gap-1">
    <p hlmLead>{{ title() }}</p>
    <div class="flex flex-col gap-1">
        @for (expense of expenses(); track expense.guid) {
            <app-expense-item [expense]="expense"></app-expense-item>
        }
        @empty {
            <div>
                <p>No {{ title().toLowerCase() }} expenses recorded.</p>
            </div>
        }
    </div>
</div>
