
<div class="flex flex-col gap-4">

    <div>
        <span hlmH4>Expenses Since {{ expenseWindow().startDate | date }}</span>
    </div>

    <div class="flex flex-col sm:flex-row gap-1">
        <!-- Actions box -->
         <a hlmBtn routerLink="expense-form" class="sm:flex-1">
            <ng-icon hlmIcon name="add"></ng-icon>
            Add Expense
        </a>
         <a hlmBtn variant="outline" class="sm:flex-1">
            <ng-icon hlmIcon name="settle"></ng-icon>
            Settle Up
         </a>
    </div>

    <hlm-tabs tab="variable">
        <hlm-tabs-list>
            <button hlmTabsTrigger="variable">Variable Expenses</button>
            <button hlmTabsTrigger="fixed">Fixed Expenses</button>
        </hlm-tabs-list>

        <div hlmTabsContent="variable">
            <app-expense-list [expenses]="expenseWindow().variableExpenses" title="Variable Expenses"></app-expense-list>
        </div>

        <div hlmTabsContent="fixed">
            <app-expense-list [expenses]="expenseWindow().fixedExpenses" title="Fixed Expenses"></app-expense-list>
        </div>
    </hlm-tabs>
</div>
